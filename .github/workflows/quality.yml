name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Scan tracked files for secrets
        run: npm run secrets:check

      - name: Check JavaScript syntax
        run: find scripts services -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Check Python syntax
        run: python -m compileall -q config-sample src
